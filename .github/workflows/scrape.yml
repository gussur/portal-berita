name: Scrape Berita Ekonomi
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: List available models
        run: |
          curl -s "https://generativelanguage.googleapis.com/v1beta/models?key=${{ secrets.GEMINI_API_KEY }}" | grep '"name"'

      - name: Jalankan scraper
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          WP_URL:           ${{ secrets.WP_URL }}
          WP_USER:          ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:  ${{ secrets.WP_APP_PASSWORD }}
        run: node scraper.js

      - name: Commit processed_urls.json
        run: |
          git config --local user.email "scraper@gussur.com"
          git config --local user.name "gussur-scraper"
          git add processed_urls.json
          git diff --staged --quiet || git commit -m "chore: update processed URLs [skip ci]"
          git push
