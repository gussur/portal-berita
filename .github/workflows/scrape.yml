name: Scrape Berita Ekonomi

on:
  schedule:
    - cron: '0 23 * * *'   # 06.00 WIB — sebelum market buka
    - cron: '30 9 * * *'   # 16.30 WIB — sesudah market tutup
  workflow_dispatch:

jobs:
  scrape:
    # Jangan jalan kalau commit dari scraper sendiri (mencegah loop)
    if: "!contains(github.event.head_commit.message, 'update berita otomatis')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Jalankan scraper
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scraper.js
